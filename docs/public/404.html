<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // SPA redirect for GitHub Pages: preserves the path so the client-side
      // router can handle it after index.html loads.
      var base = '/unify-table';
      var path = window.location.pathname;
      if (path.startsWith(base)) path = path.slice(base.length);
      var search = window.location.search;
      window.location.replace(
        base + '/?p=' + encodeURIComponent(path + search)
      );
    </script>
  </head>
  <body></body>
</html>
