<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unify Table — Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // SPA redirect support for GitHub Pages: the 404.html redirects here
      // with the original path stored in ?p=..., so we restore it before React boots.
      (function () {
        var q = new URLSearchParams(window.location.search);
        var p = q.get('p');
        if (p) {
          var base = '/unify-table';
          window.history.replaceState(null, '', base + decodeURIComponent(p));
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
